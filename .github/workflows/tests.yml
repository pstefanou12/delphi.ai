name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint
          pip install -r requirements.txt || true
          pip install -e .

      - name: Run ruff
        run: |
          ruff check delphi/ tests/
          ruff format --check delphi/ tests/

      - name: Run pylint
        run: pylint --errors-only delphi/ tests/
